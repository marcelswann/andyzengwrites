  <main class="wrap">
    <h1>Influences</h1>
    <p class="lede">A running list of lines I return to.</p>

    <section class="section">
      <div class="influences">
        <!-- Alphabetical by author tag (as provided) -->

        <figure class="inf">
          <blockquote class="inf-quote">“Lord, make me chaste, but not yet.”</blockquote>
          <figcaption class="inf-attrib">Augustine</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">“No worthy problem is ever solved in the plane of its original conception.”</blockquote>
          <figcaption class="inf-attrib">Albert Einstein</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">“The activity of God, which surpasses all others in blessedness, must be contemplation.”</blockquote>
          <figcaption class="inf-attrib">Aristotle</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">“In Kyoto, hearing the cuckoo, I long for Kyoto.”</blockquote>
          <figcaption class="inf-attrib">Bashō (trans.)</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">“There is no such joy in the tavern as upon the road thereto.”</blockquote>
          <figcaption class="inf-attrib">Cervantes</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">
            “Words are concepts, but concepts are lines—number systems attached to a particular dimension of multiplicities
            (strata, molecular chains, lines of flight or rupture, circles of convergence, etc.).”
          </blockquote>
          <figcaption class="inf-attrib">Deleuze &amp; Guattari</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">
            “On ne peut penser et écrire qu’assis (G. Flaubert). Here I have got you, you nihilist! A sedentary life is the real sin against the Holy Spirit.
            Only those thoughts that come by walking have any value.”
          </blockquote>
          <figcaption class="inf-attrib">Friedrich Nietzsche</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">“Soyons vrais, même si nous sommes laids.”</blockquote>
          <figcaption class="inf-attrib">Georges Courteline</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">“Trouve avant de chercher.”</blockquote>
          <figcaption class="inf-attrib">Paul Valéry</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">“Regarder, c’est-à-dire oublier le nom des choses que l’on voit.”</blockquote>
          <figcaption class="inf-attrib">Paul Valéry</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">“Forsan et haec olim meminisse iuvabit.”</blockquote>
          <figcaption class="inf-attrib">Virgil</figcaption>
        </figure>

        <figure class="inf">
          <blockquote class="inf-quote">
            “Now I am terrified at the Earth—it is that calm and patient; it grows such sweet things out of such corruptions.”
          </blockquote>
          <figcaption class="inf-attrib">Walt Whitman</figcaption>
        </figure>
      </div>
    </section>
